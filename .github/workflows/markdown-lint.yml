name: Markdown Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  markdown-lint:
    name: Lint Markdown files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run markdown lint
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: |
            *.md
            .github/**/*.md
          config: |
            {
              "MD013": false,
              "MD033": false,
              "MD041": false,
              "MD001": true,
              "MD022": true,
              "MD031": true,
              "MD032": true
            }
